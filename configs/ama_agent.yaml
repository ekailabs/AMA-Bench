# AMA-Agent Method Configuration

# Method-specific settings for AMA-Agent
retrieval_mode: "bm25"  # Options: "none", "bm25", "llm", "embed"
temperature: 0
max_tokens: 32000
chunk_size: 8192
enable_tools: true
casual: false

# Model configuration (will be overridden by LLM config if using vLLM)
model: "Qwen/Qwen3-32B"
base_url: "http://localhost:8002/v1"
api_key: "EMPTY"

# Embedding engine configuration
embedding_engine:
  model_name: "qwen3-embedding-4B"
  base_url: "http://localhost:8003/v1"
  api_key: "EMPTY"
  batch_size: 8
  max_length: 512
