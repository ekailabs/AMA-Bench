# AMA-Bench Evaluation Configuration for VLLM

# Model configuration
provider: "vllm"
model: "Qwen/Qwen3-32B"

# VLLM server configuration
vllm_host: "localhost"
vllm_port: 8001

# VLLM launch configuration
vllm_launch:
  gpus: "1,2,3,4"
  max_model_len: 32000
  max_response_len: 4096
  tensor_parallel_size: 4


